# Source credibility tiers for authority scoring.
# Tier 1 = highest trust (.gov, .edu, major journals)
# Tier 4 = lowest trust (unknown, unverified)

[tier1]
domains = [
    "*.gov", "*.edu", "*.ac.uk",
    "nature.com", "science.org", "thelancet.com",
    "who.int", "nasa.gov", "cdc.gov",
    "arxiv.org", "pubmed.ncbi.nlm.nih.gov",
    "ieee.org", "acm.org",
]
suffixes = [".gov", ".edu", ".mil"]
weight = 1.3

[tier2]
domains = [
    "reuters.com", "apnews.com", "bbc.com",
    "nytimes.com", "washingtonpost.com",
    "docs.python.org", "docs.rs", "developer.mozilla.org",
    "en.wikipedia.org", "stackoverflow.com",
    "github.com",
]
weight = 1.1

[tier3]
domains = [
    "medium.com", "dev.to", "reddit.com",
    "quora.com", "hackernews.com",
]
weight = 0.9

[tier4]
# Everything else defaults to tier 4
weight = 0.7
